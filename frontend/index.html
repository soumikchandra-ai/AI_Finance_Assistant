<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Financial Analyst</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <h1>AI Financial Analyst</h1>

        <div class="search-box">
            <input type="text" id="symbol" placeholder="Enter stock symbol">

            <button onclick="analyzeStock()">
                Analyze
            </button>
        </div>

        <div id="result"></div>

        <hr>

        <h2>📊 Portfolio Analysis</h2>

        <input type="text" id="portfolioStocks"
        placeholder="AAPL,MSFT,TSLA">

        <button onclick="analyzePortfolio()">
        Analyze Portfolio
        </button>

        <div id="portfolioResult"></div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
